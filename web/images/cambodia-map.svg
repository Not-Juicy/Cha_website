<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 540" width="440" height="540">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
    <filter id="red-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="dot-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E31E24" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E31E24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ocean / background -->
  <rect width="440" height="540" fill="#F2F4F8" rx="16"/>

  <!-- Neighboring countries (subtle) -->
  <path d="M 30 380 Q 25 350 30 320 L 50 310 Q 60 300 70 310 L 75 320 L 50 380 Z" fill="#E5E8EE"/>
  <path d="M 70 310 Q 80 290 100 280 L 110 270 L 120 260 L 130 250 L 140 240 L 150 230 L 160 220 L 170 200 L 180 180 L 200 160 Q 220 140 250 130 L 280 125 L 320 130 Q 350 140 370 160 L 390 180 L 400 200 L 400 310 L 50 310 Z" fill="#E5E8EE"/>
  <path d="M 50 310 L 400 310 L 400 540 L 0 540 L 0 380 Z" fill="#E5E8EE"/>

  <!-- Cambodia main shape -->
  <path d="M 140 240 L 150 230 L 160 220 L 170 200 L 180 180 L 200 160
           Q 220 140 250 130 L 280 125
           L 320 130 Q 350 140 370 160 L 390 180 L 400 200
           L 410 220 Q 410 250 400 280
           L 390 320 L 370 350 Q 350 380 320 400
           L 290 420 Q 260 435 230 440
           L 200 445 Q 170 440 150 430
           L 120 410 Q 90 390 70 370
           L 55 350 Q 50 320 60 290
           L 80 270 L 100 260 L 120 250
           L 130 245 Z"
        fill="#ffffff" stroke="#0B1D6D" stroke-width="2.5" filter="url(#shadow)"/>

  <!-- Province borders (simplified) -->
  <path d="M 140 240 L 180 320 L 200 445" stroke="#CDD2DB" stroke-width="1" fill="none"/>
  <path d="M 250 130 L 280 300 L 230 440" stroke="#CDD2DB" stroke-width="1" fill="none"/>
  <path d="M 320 130 L 350 300 L 290 420" stroke="#CDD2DB" stroke-width="1" fill="none"/>
  <path d="M 370 160 L 380 300 L 320 400" stroke="#CDD2DB" stroke-width="1" fill="none"/>
  <path d="M 60 290 L 400 280" stroke="#CDD2DB" stroke-width="1" fill="none"/>
  <path d="M 80 270 L 390 320" stroke="#CDD2DB" stroke-width="0.6" fill="none"/>

  <!-- Red pin: Phnom Penh -->
  <g transform="translate(220, 330)">
    <circle cx="0" cy="0" r="14" fill="url(#dot-glow)"/>
    <path d="M 0 0 L -8 -18 Q 0 -28 8 -18 Z" fill="#E31E24" filter="url(#red-glow)"/>
    <circle cx="0" cy="-18" r="6" fill="#ffffff"/>
    <text x="16" y="8" font-family="Poppins,sans-serif" font-size="11" font-weight="700" fill="#0B1D6D">Phnom Penh</text>
  </g>

  <!-- Red pin: Siem Reap -->
  <g transform="translate(260, 175)">
    <circle cx="0" cy="0" r="12" fill="url(#dot-glow)"/>
    <path d="M 0 0 L -7 -15 Q 0 -24 7 -15 Z" fill="#E31E24" filter="url(#red-glow)"/>
    <circle cx="0" cy="-15" r="5" fill="#ffffff"/>
    <text x="14" y="6" font-family="Poppins,sans-serif" font-size="11" font-weight="700" fill="#0B1D6D">Siem Reap</text>
  </g>

  <!-- Small red dots: Battambang -->
  <g transform="translate(130, 230)">
    <circle cx="0" cy="0" r="7" fill="url(#dot-glow)"/>
    <circle cx="0" cy="0" r="4" fill="#E31E24"/>
    <text x="10" y="4" font-family="Poppins,sans-serif" font-size="8" font-weight="600" fill="#6B7280">Battambang</text>
  </g>

  <!-- Small red dot: Sihanoukville -->
  <g transform="translate(175, 410)">
    <circle cx="0" cy="0" r="6" fill="url(#dot-glow)"/>
    <circle cx="0" cy="0" r="3.5" fill="#E31E24"/>
    <text x="10" y="4" font-family="Poppins,sans-serif" font-size="8" font-weight="600" fill="#6B7280">Sihanoukville</text>
  </g>

  <!-- Small red dot: Kampong Cham -->
  <g transform="translate(310, 340)">
    <circle cx="0" cy="0" r="6" fill="url(#dot-glow)"/>
    <circle cx="0" cy="0" r="3.5" fill="#E31E24"/>
    <text x="10" y="4" font-family="Poppins,sans-serif" font-size="8" font-weight="600" fill="#6B7280">Kampong Cham</text>
  </g>

  <!-- Small red dot: Kratie -->
  <g transform="translate(360, 290)">
    <circle cx="0" cy="0" r="5" fill="url(#dot-glow)"/>
    <circle cx="0" cy="0" r="3" fill="#E31E24"/>
    <text x="9" y="4" font-family="Poppins,sans-serif" font-size="8" font-weight="600" fill="#6B7280">Kratie</text>
  </g>

  <!-- Title -->
  <text x="220" y="520" text-anchor="middle" font-family="Poppins,sans-serif" font-size="10" fill="#9AA0AC">Cambodia · Treatment Centres</text>
</svg>
